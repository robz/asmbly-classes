services:
  postgres:
    image: postgres:17
    container_name: asmbly-dev-db
    environment:
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - ./dev/dev-db.sql:/docker-entrypoint-initdb.d/01-dev-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
